<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lucky VPN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h2>💎 Lucky VPN</h2>

<p id="status">Загрузка...</p>
<p id="keys"></p>

<button onclick="getKey()">🔑 Получить ключ</button>

<script>
const tg = window.Telegram.WebApp;
const user_id = tg.initDataUnsafe.user.id;

async function load() {
    let res = await fetch(`/user?user_id=${user_id}`);
    let data = await res.json();

    document.getElementById("status").innerText = "📅 До: " + data.free_until;
    document.getElementById("keys").innerText = "🔑 " + data.keys.join(", ");
}

async function getKey() {
    let res = await fetch(`/get_key?user_id=${user_id}`);
    let data = await res.json();

    document.getElementById("keys").innerText = "🔑 " + data.keys.join(", ");
}

load();
</script>

</body>
</html>
